spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://postgres:12345@cluster0.jxpjdn1.mongodb.net/?appName=Cluster0}
      database: ${MONGODB_DATABASE:sportlife_db}
      auto-index-creation: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:MyDefaultDevSecretKeyThatIs32Chars!!}
  expiration: ${JWT_EXPIRATION:36000000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

logging:
  level:
    edu.eci.preparcial: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
