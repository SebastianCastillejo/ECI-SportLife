name: CI/CD - SportLife

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ── 1. BUILD Y TEST ─────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y testear
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/sportlife_db
          MONGODB_DATABASE: sportlife_db
          JWT_SECRET: TestSecretKeyForGitHubActionsMinimo32Chars
          JWT_EXPIRATION: 36000000
        run: mvn clean verify -B

      - name: Generar reporte JaCoCo
        run: mvn jacoco:report -B

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # ── 2. ANÁLISIS SONARQUBE ────────────────────────────────────────────────────
  analysis:
    name: Análisis SonarQube
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Análisis SonarQube
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=ECI-SportLife \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -B
        continue-on-error: true

  # ── 3. EMPAQUETAR JAR ────────────────────────────────────────────────────────
  package:
    name: Empaquetar JAR
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generar JAR
        run: mvn clean package -DskipTests -B

      - name: Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: sportlife-jar
          path: target/*.jar
          retention-days: 5

  # ── 4. DEPLOY A AZURE (solo en master) ──────────────────────────────────────
  deploy:
    name: Deploy a Azure App Service
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generar JAR para deploy
        run: mvn clean package -DskipTests -B

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.PRE_PARCIAL }}

      - name: Configurar variables de entorno en Azure
        run: |
          az webapp config appsettings set \
            --name preparcial \
            --resource-group preparcial_group \
            --settings \
              SPRING_DATA_MONGODB_URI="${{ secrets.AZURE_MONGODB_URI }}" \
              MONGODB_DATABASE="sportlife_db" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              JWT_EXPIRATION="36000000" \
              PORT="8080"

      - name: Deploy JAR a Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: preparcial
          package: target/*.jar

      - name: Verificar despliegue
        run: |
          sleep 60
          curl -f https://preparcial.azurewebsites.net/v3/api-docs \
            || echo 'Revisar logs en Azure Portal'
